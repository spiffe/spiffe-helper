agent_address = "/run/spire/api.sock"
cmd = "/usr/libexec/postgresql16/postgres"
cmd_args = "-D /var/lib/postgresql/data -c config_file=/var/lib/postgresql/data/postgresql.conf"
cert_dir = "/run/postgresql/certs"
renew_signal = "SIGHUP"
svid_file_name = "server.crt"
svid_key_file_name = "server.key"
svid_bundle_file_name = "root.crt"
