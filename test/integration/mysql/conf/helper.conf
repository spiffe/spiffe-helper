agent_address = "/run/spire/api.sock"
cmd = "/usr/bin/mysql"
cmd_args = "--protocol=socket --socket=/run/mysqld/mysqld.sock -uroot -e \"ALTER INSTANCE RELOAD TLS;\""
cert_dir = "/var/lib/mysql/certs"
svid_file_name = "server-cert.pem"
svid_key_file_name = "server-key.pem"
svid_bundle_file_name = "ca.pem"
cert_file_mode = 0644
key_file_mode = 0644
add_intermediates_to_bundle = true
